<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏀 打球记录 - Basketball Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #ff6b35;
            --primary-dark: #e55a28;
            --secondary: #4ecdc4;
            --bg-dark: #0f0f1a;
            --bg-card: #1a1a2e;
            --bg-input: #252545;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b8;
            --success: #4ade80;
            --warning: #fbbf24;
            --danger: #f87171;
            --game: #ff6b35;
            --casual: #4ecdc4;
            --practice: #a78bfa;
            --lesson: #fbbf24;
            --gradient-1: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%);
            --gradient-2: linear-gradient(135deg, #4ecdc4 0%, #44a08d 100%);
            --shadow: 0 20px 60px rgba(0,0,0,0.3);
            --shadow-glow: 0 0 40px rgba(255,107,53,0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 动态背景 */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(255,107,53,0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(78,205,196,0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(167,139,250,0.05) 0%, transparent 40%);
            animation: bgFloat 20s ease-in-out infinite;
        }

        @keyframes bgFloat {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(2%, 2%) rotate(1deg); }
            66% { transform: translate(-1%, 1%) rotate(-1deg); }
        }

        /* 容器 */
        .container {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        /* 头部 */
        .header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 0.8s ease;
        }

        .header h1 {
            font-size: 3rem;
            font-weight: 700;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            display: inline-flex;
            align-items: center;
            gap: 15px;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 30px;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: fadeInUp 0.6s ease backwards;
        }

        .stat-card:nth-child(1) { animation-delay: 0.1s; }
        .stat-card:nth-child(2) { animation-delay: 0.2s; }
        .stat-card:nth-child(3) { animation-delay: 0.3s; }
        .stat-card:nth-child(4) { animation-delay: 0.4s; }

        .stat-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: var(--shadow-glow);
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
        }

        .stat-card.total::before { background: var(--gradient-1); }
        .stat-card.duration::before { background: var(--gradient-2); }
        .stat-card.cost::before { background: linear-gradient(90deg, #a78bfa, #c084fc); }
        .stat-card.winrate::before { background: linear-gradient(90deg, #fbbf24, #f59e0b); }

        .stat-icon {
            font-size: 3rem;
            margin-bottom: 15px;
            display: block;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 主要内容区 */
        .main-content {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 30px;
        }

        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        /* 表单卡片 */
        .form-card {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 30px;
            height: fit-content;
            position: sticky;
            top: 30px;
            animation: fadeInLeft 0.6s ease 0.3s backwards;
        }

        @keyframes fadeInLeft {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .form-card h2 {
            font-size: 1.5rem;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 14px 18px;
            background: var(--bg-input);
            border: 2px solid transparent;
            border-radius: 14px;
            color: var(--text-primary);
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(255,107,53,0.1);
        }

        .type-selector {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .type-option {
            position: relative;
            cursor: pointer;
        }

        .type-option input {
            position: absolute;
            opacity: 0;
        }

        .type-option label {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px 10px;
            background: var(--bg-input);
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            margin: 0;
        }

        .type-option label:hover {
            transform: translateY(-2px);
        }

        .type-option input:checked + label {
            border-color: currentColor;
        }

        .type-option.game input:checked + label { border-color: var(--game); background: rgba(255,107,53,0.1); }
        .type-option.casual input:checked + label { border-color: var(--casual); background: rgba(78,205,196,0.1); }
        .type-option.practice input:checked + label { border-color: var(--practice); background: rgba(167,139,250,0.1); }
        .type-option.lesson input:checked + label { border-color: var(--lesson); background: rgba(251,191,36,0.1); }

        .type-icon {
            font-size: 1.8rem;
            margin-bottom: 5px;
        }

        .type-text {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .type-option input:checked + label .type-text {
            color: var(--text-primary);
            font-weight: 500;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: var(--gradient-1);
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255,107,53,0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .submit-btn:active::after {
            width: 300px;
            height: 300px;
        }

        /* 记录列表 */
        .records-section {
            animation: fadeInRight 0.6s ease 0.4s backwards;
        }

        @keyframes fadeInRight {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .section-header h2 {
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .filter-tabs {
            display: flex;
            gap: 10px;
            background: var(--bg-card);
            padding: 6px;
            border-radius: 12px;
        }

        .filter-tab {
            padding: 8px 16px;
            background: transparent;
            border: none;
            border-radius: 8px;
            color: var(--text-secondary);
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-tab:hover {
            color: var(--text-primary);
        }

        .filter-tab.active {
            background: var(--bg-input);
            color: var(--text-primary);
        }

        .records-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .record-item {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 20px 25px;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: all 0.3s ease;
            animation: slideIn 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .record-item:hover {
            transform: translateX(5px);
            box-shadow: var(--shadow);
        }

        .record-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
        }

        .record-item.game::before { background: var(--game); }
        .record-item.casual::before { background: var(--casual); }
        .record-item.practice::before { background: var(--practice); }
        .record-item.lesson::before { background: var(--lesson); }

        .record-icon {
            font-size: 2.5rem;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-input);
            border-radius: 16px;
        }

        .record-info {
            flex: 1;
        }

        .record-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .record-type {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .record-type.game { background: rgba(255,107,53,0.2); color: var(--game); }
        .record-type.casual { background: rgba(78,205,196,0.2); color: var(--casual); }
        .record-type.practice { background: rgba(167,139,250,0.2); color: var(--practice); }
        .record-type.lesson { background: rgba(251,191,36,0.2); color: var(--lesson); }

        .record-date {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .record-details {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .record-detail {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .record-detail.highlight {
            color: var(--success);
            font-weight: 500;
        }

        .record-actions {
            display: flex;
            gap: 10px;
        }

        .action-btn {
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 10px;
            background: var(--bg-input);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .action-btn:hover {
            background: var(--primary);
            color: white;
            transform: scale(1.1);
        }

        .action-btn.delete:hover {
            background: var(--danger);
        }

        /* 图表区域 */
        .charts-section {
            margin-top: 40px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 30px;
            animation: fadeInUp 0.6s ease 0.5s backwards;
        }

        .chart-card {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 30px;
        }

        .chart-card h3 {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: var(--text-secondary);
        }

        .chart-container {
            position: relative;
            height: 250px;
        }

        /* 月份统计区域 */
        .monthly-section {
            margin-top: 40px;
            animation: fadeInUp 0.6s ease 0.6s backwards;
        }

        .monthly-section .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .monthly-summary {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .monthly-summary-item {
            background: var(--bg-card);
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .monthly-summary-item strong {
            color: var(--primary);
            font-size: 1.2rem;
        }

        .monthly-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .month-card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 25px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .month-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow);
        }

        .month-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--gradient-1);
        }

        .month-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--text-primary);
        }

        .month-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 15px;
        }

        .month-stat {
            background: var(--bg-input);
            padding: 12px;
            border-radius: 12px;
            text-align: center;
        }

        .month-stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
        }

        .month-stat-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .month-types {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .month-type-tag {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            background: var(--bg-input);
            color: var(--text-secondary);
        }

        .month-type-tag.game { background: rgba(255,107,53,0.2); color: var(--game); }
        .month-type-tag.casual { background: rgba(78,205,196,0.2); color: var(--casual); }
        .month-type-tag.practice { background: rgba(167,139,250,0.2); color: var(--practice); }
        .month-type-tag.lesson { background: rgba(251,191,36,0.2); color: var(--lesson); }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state .emoji {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        /* 提示消息 */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 16px 24px;
            background: var(--bg-card);
            border-radius: 14px;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateX(150%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.success { border-left: 4px solid var(--success); }
        .toast.error { border-left: 4px solid var(--danger); }

        /* 响应式 */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }
            
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .record-item {
                flex-wrap: wrap;
            }
            
            .charts-section {
                grid-template-columns: 1fr;
            }
        }

        /* 加载动画 */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 条件字段 */
        .conditional-field {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease, opacity 0.3s ease;
            opacity: 0;
        }

        .conditional-field.show {
            max-height: 200px;
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    
    <div class="container">
        <!-- 头部 -->
        <header class="header">
            <h1>🏀 打球记录</h1>
            <p>记录每一次挥洒汗水的时刻</p>
        </header>

        <!-- 统计卡片 -->
        <div class="stats-grid">
            <div class="stat-card total">
                <span class="stat-icon">📊</span>
                <div class="stat-value" id="stat-total">0</div>
                <div class="stat-label">总记录数</div>
            </div>
            <div class="stat-card duration">
                <span class="stat-icon">⏱️</span>
                <div class="stat-value" id="stat-duration">0<span style="font-size:1rem">小时</span></div>
                <div class="stat-label">累计时长</div>
            </div>
            <div class="stat-card cost">
                <span class="stat-icon">💰</span>
                <div class="stat-value" id="stat-cost">¥0</div>
                <div class="stat-label">总花费</div>
            </div>
            <div class="stat-card winrate">
                <span class="stat-icon">🏆</span>
                <div class="stat-value" id="stat-winrate">--</div>
                <div class="stat-label">比赛胜率</div>
            </div>
        </div>

        <!-- 主要内容 -->
        <div class="main-content">
            <!-- 录入表单 -->
            <div class="form-card">
                <h2>✨ 添加新记录</h2>
                <form id="record-form">
                    <div class="form-group">
                        <label>记录类型</label>
                        <div class="type-selector">
                            <div class="type-option game">
                                <input type="radio" name="type" value="比赛" id="type-game" checked>
                                <label for="type-game">
                                    <span class="type-icon">🏆</span>
                                    <span class="type-text">比赛</span>
                                </label>
                            </div>
                            <div class="type-option casual">
                                <input type="radio" name="type" value="约球" id="type-casual">
                                <label for="type-casual">
                                    <span class="type-icon">🤝</span>
                                    <span class="type-text">约球</span>
                                </label>
                            </div>
                            <div class="type-option practice">
                                <input type="radio" name="type" value="练习" id="type-practice">
                                <label for="type-practice">
                                    <span class="type-icon">💪</span>
                                    <span class="type-text">练习</span>
                                </label>
                            </div>
                            <div class="type-option lesson">
                                <input type="radio" name="type" value="上课" id="type-lesson">
                                <label for="type-lesson">
                                    <span class="type-icon">🎓</span>
                                    <span class="type-text">上课</span>
                                </label>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="date">日期</label>
                        <input type="date" id="date" name="date" required>
                    </div>

                    <div class="form-group">
                        <label for="duration">时长（分钟）</label>
                        <input type="number" id="duration" name="duration" min="1" placeholder="例如：90" required>
                    </div>

                    <div class="form-group">
                        <label for="cost">花费（元）</label>
                        <input type="number" id="cost" name="cost" min="0" step="0.01" placeholder="0">
                    </div>

                    <!-- 比赛特有字段 -->
                    <div class="form-group conditional-field" id="score-field">
                        <label for="score">比赛成绩（如 100:95）</label>
                        <input type="text" id="score" name="score" placeholder="我方:对方">
                    </div>

                    <!-- 练习/上课特有字段 -->
                    <div class="form-group conditional-field" id="technique-field">
                        <label for="technique">训练内容</label>
                        <input type="text" id="technique" name="technique" placeholder="正手、反手">
                    </div>

                    <div class="form-group">
                        <label for="note">备注</label>
                        <textarea id="note" name="note" rows="2" placeholder="添加备注..."></textarea>
                    </div>

                    <button type="submit" class="submit-btn">
                        🚀 添加记录
                    </button>
                </form>
            </div>

            <!-- 记录列表 -->
            <div class="records-section">
                <div class="section-header">
                    <h2>📋 历史记录</h2>
                    <div class="filter-tabs">
                        <button class="filter-tab active" data-filter="all">全部</button>
                        <button class="filter-tab" data-filter="比赛">比赛</button>
                        <button class="filter-tab" data-filter="约球">约球</button>
                        <button class="filter-tab" data-filter="练习">练习</button>
                        <button class="filter-tab" data-filter="上课">上课</button>
                    </div>
                </div>
                <div class="records-list" id="records-list">
                    <!-- 动态生成 -->
                </div>
            </div>
        </div>

        <!-- 图表 -->
        <div class="charts-section">
            <div class="chart-card">
                <h3>📊 各类型占比</h3>
                <div class="chart-container">
                    <canvas id="typeChart"></canvas>
                </div>
            </div>
            <div class="chart-card">
                <h3>📈 每月时长趋势</h3>
                <div class="chart-container">
                    <canvas id="trendChart"></canvas>
                </div>
            </div>
        </div>

        <!-- 月份统计 -->
        <div class="monthly-section">
            <div class="section-header">
                <h2>📅 月份统计</h2>
                <div class="monthly-summary" id="monthly-summary">
                    <!-- 动态生成总览 -->
                </div>
            </div>
            <div class="monthly-grid" id="monthly-grid">
                <!-- 动态生成月份卡片 -->
            </div>
        </div>
    </div>

    <!-- 提示消息 -->
    <div class="toast" id="toast">
        <span id="toast-icon">✅</span>
        <span id="toast-message">操作成功</span>
    </div>

    <script>
        // ============ 配置和状态 ============
        const API_BASE = '/api';
        const TYPE_ICONS = {
            '比赛': '🏆',
            '约球': '🤝',
            '练习': '💪',
            '上课': '🎓'
        };
        const TYPE_CLASS = {
            '比赛': 'game',
            '约球': 'casual',
            '练习': 'practice',
            '上课': 'lesson'
        };

        let currentFilter = 'all';
        let records = [];
        let typeChart = null;
        let trendChart = null;

        // ============ 初始化 ============
        document.addEventListener('DOMContentLoaded', () => {
            // 设置默认日期为今天
            document.getElementById('date').valueAsDate = new Date();
            
            // 加载数据
            loadData();
            
            // 绑定事件
            bindEvents();
        });

        // ============ 事件绑定 ============
        function bindEvents() {
            // 表单提交
            document.getElementById('record-form').addEventListener('submit', handleSubmit);
            
            // 类型选择切换
            document.querySelectorAll('input[name="type"]').forEach(radio => {
                radio.addEventListener('change', handleTypeChange);
            });
            
            // 筛选标签
            document.querySelectorAll('.filter-tab').forEach(tab => {
                tab.addEventListener('click', handleFilter);
            });
        }

        // ============ 数据加载 ============
        async function loadData() {
            try {
                const [recordsRes, statsRes] = await Promise.all([
                    fetch(`${API_BASE}/records`),
                    fetch(`${API_BASE}/statistics`)
                ]);
                
                const recordsData = await recordsRes.json();
                const statsData = await statsRes.json();
                
                if (recordsData.success) {
                    records = recordsData.data;
                    renderRecords();
                }
                
                if (statsData.success) {
                    updateStats(statsData.data);
                    updateCharts(statsData.data);
                }
            } catch (error) {
                showToast('❌ 数据加载失败', 'error');
                console.error(error);
            }
        }

        // ============ 更新统计 ============
        function updateStats(stats) {
            document.getElementById('stat-total').textContent = stats.total_records;
            document.getElementById('stat-duration').innerHTML = 
                Math.round(stats.total_duration / 60 * 10) / 10 + '<span style="font-size:1rem">小时</span>';
            document.getElementById('stat-cost').textContent = '¥' + stats.total_cost.toFixed(0);
            
            if (stats.win_rate !== undefined) {
                document.getElementById('stat-winrate').textContent = stats.win_rate + '%';
            } else {
                document.getElementById('stat-winrate').textContent = '--';
            }
            
            // 更新月份统计
            renderMonthlyStats(stats);
        }

        // ============ 渲染记录列表 ============
        function renderRecords() {
            const list = document.getElementById('records-list');
            
            const filtered = currentFilter === 'all' 
                ? records 
                : records.filter(r => r.type === currentFilter);
            
            if (filtered.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="emoji">🏀</div>
                        <p>暂无记录，快去添加第一条吧！</p>
                    </div>
                `;
                return;
            }
            
            list.innerHTML = filtered.map(record => `
                <div class="record-item ${TYPE_CLASS[record.type]}" data-id="${record.id}">
                    <div class="record-icon">${TYPE_ICONS[record.type]}</div>
                    <div class="record-info">
                        <div class="record-header">
                            <span class="record-type ${TYPE_CLASS[record.type]}">${record.type}</span>
                            <span class="record-date">${record.date}</span>
                        </div>
                        <div class="record-details">
                            <span class="record-detail">⏱️ ${record.duration_minutes}分钟</span>
                            ${record.cost > 0 ? `<span class="record-detail">💰 ¥${record.cost}</span>` : ''}
                            ${record.score ? `<span class="record-detail highlight">🏆 ${record.score}</span>` : ''}
                            ${record.technique ? `<span class="record-detail">📝 ${record.technique}</span>` : ''}
                            ${record.note ? `<span class="record-detail">💬 ${record.note}</span>` : ''}
                        </div>
                    </div>
                    <div class="record-actions">
                        <button class="action-btn delete" onclick="deleteRecord(${record.id})" title="删除">
                            🗑️
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // ============ 表单处理 ============
        function handleTypeChange(e) {
            const type = e.target.value;
            const scoreField = document.getElementById('score-field');
            const techniqueField = document.getElementById('technique-field');
            
            scoreField.classList.remove('show');
            techniqueField.classList.remove('show');
            
            if (type === '比赛') {
                scoreField.classList.add('show');
            } else if (type === '练习' || type === '上课') {
                techniqueField.classList.add('show');
            }
        }

        async function handleSubmit(e) {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const data = {
                type: formData.get('type'),
                date: formData.get('date'),
                duration_minutes: parseInt(formData.get('duration')),
                cost: parseFloat(formData.get('cost') || 0),
                score: formData.get('score') || '',
                technique: formData.get('technique') || '',
                note: formData.get('note') || ''
            };
            
            try {
                const res = await fetch(`${API_BASE}/records`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await res.json();
                
                if (result.success) {
                    showToast('✅ 记录添加成功！', 'success');
                    e.target.reset();
                    document.getElementById('date').valueAsDate = new Date();
                    handleTypeChange({ target: { value: '比赛' } });
                    loadData();
                } else {
                    showToast('❌ ' + result.message, 'error');
                }
            } catch (error) {
                showToast('❌ 添加失败', 'error');
                console.error(error);
            }
        }

        // ============ 筛选 ============
        function handleFilter(e) {
            document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
            e.target.classList.add('active');
            currentFilter = e.target.dataset.filter;
            renderRecords();
        }

        // ============ 删除记录 ============
        async function deleteRecord(id) {
            if (!confirm('确定要删除这条记录吗？')) return;
            
            try {
                const res = await fetch(`${API_BASE}/records/${id}`, { method: 'DELETE' });
                const result = await res.json();
                
                if (result.success) {
                    showToast('✅ 记录已删除', 'success');
                    loadData();
                } else {
                    showToast('❌ 删除失败', 'error');
                }
            } catch (error) {
                showToast('❌ 删除失败', 'error');
            }
        }

        // ============ 图表 ============
        function updateCharts(stats) {
            updateTypeChart(stats.by_type);
            updateTrendChart(stats.monthly);
        }

        function updateTypeChart(byType) {
            const ctx = document.getElementById('typeChart').getContext('2d');
            
            const data = [
                byType['比赛']?.count || 0,
                byType['约球']?.count || 0,
                byType['练习']?.count || 0,
                byType['上课']?.count || 0
            ];
            
            if (typeChart) typeChart.destroy();
            
            typeChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['比赛', '约球', '练习', '上课'],
                    datasets: [{
                        data: data,
                        backgroundColor: ['#ff6b35', '#4ecdc4', '#a78bfa', '#fbbf24'],
                        borderWidth: 0,
                        hoverOffset: 10
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'right',
                            labels: {
                                color: '#a0a0b8',
                                padding: 20,
                                font: { size: 12 }
                            }
                        }
                    },
                    cutout: '65%'
                }
            });
        }

        function updateTrendChart(monthly) {
            const ctx = document.getElementById('trendChart').getContext('2d');
            
            const sortedMonths = Object.keys(monthly).sort();
            const durations = sortedMonths.map(m => monthly[m].duration / 60); // 转为小时
            
            if (trendChart) trendChart.destroy();
            
            trendChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: sortedMonths,
                    datasets: [{
                        label: '打球时长（小时）',
                        data: durations,
                        borderColor: '#ff6b35',
                        backgroundColor: 'rgba(255,107,53,0.1)',
                        borderWidth: 3,
                        fill: true,
                        tension: 0.4,
                        pointBackgroundColor: '#ff6b35',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2,
                        pointRadius: 5,
                        pointHoverRadius: 7
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            labels: { color: '#a0a0b8' }
                        }
                    },
                    scales: {
                        x: {
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: { color: '#a0a0b8' }
                        },
                        y: {
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: { color: '#a0a0b8' }
                        }
                    }
                }
            });
        }

        // ============ 月份统计渲染 ============
        function renderMonthlyStats(stats) {
            const monthly = stats.monthly || {};
            const sortedMonths = Object.keys(monthly).sort().reverse(); // 最新的月份在前
            
            // 渲染总览
            const summaryEl = document.getElementById('monthly-summary');
            const totalMonths = sortedMonths.length;
            const avgDuration = totalMonths > 0 ? Math.round(stats.total_duration / totalMonths / 60 * 10) / 10 : 0;
            
            summaryEl.innerHTML = `
                <div class="monthly-summary-item">
                    <strong>${totalMonths}</strong> 个月
                </div>
                <div class="monthly-summary-item">
                    月均 <strong>${avgDuration}</strong> 小时
                </div>
                <div class="monthly-summary-item">
                    总计 <strong>${Math.round(stats.total_duration / 60 * 10) / 10}</strong> 小时
                </div>
            `;
            
            // 渲染月份卡片
            const gridEl = document.getElementById('monthly-grid');
            
            if (sortedMonths.length === 0) {
                gridEl.innerHTML = '<div class="empty-state"><div class="emoji">📅</div><p>暂无月度数据</p></div>';
                return;
            }
            
            // 计算每个月的类型分布
            const monthTypes = {};
            records.forEach(r => {
                const month = r.date.substring(0, 7);
                if (!monthTypes[month]) {
                    monthTypes[month] = {};
                }
                monthTypes[month][r.type] = (monthTypes[month][r.type] || 0) + 1;
            });
            
            gridEl.innerHTML = sortedMonths.map(month => {
                const data = monthly[month];
                const types = monthTypes[month] || {};
                const typeTags = Object.entries(types).map(([type, count]) => {
                    const className = TYPE_CLASS[type] || '';
                    return `<span class="month-type-tag ${className}">${TYPE_ICONS[type]} ${type} ${count}次</span>`;
                }).join('');
                
                return `
                    <div class="month-card">
                        <div class="month-title">${month.replace('-', '年')}月</div>
                        <div class="month-stats">
                            <div class="month-stat">
                                <div class="month-stat-value">${data.count}</div>
                                <div class="month-stat-label">次</div>
                            </div>
                            <div class="month-stat">
                                <div class="month-stat-value">${Math.round(data.duration / 60 * 10) / 10}</div>
                                <div class="month-stat-label">小时</div>
                            </div>
                            <div class="month-stat">
                                <div class="month-stat-value">${data.cost > 0 ? '¥' + data.cost : '-'}</div>
                                <div class="month-stat-label">花费</div>
                            </div>
                            <div class="month-stat">
                                <div class="month-stat-value">${Math.round(data.duration / data.count)}</div>
                                <div class="month-stat-label">均分钟</div>
                            </div>
                        </div>
                        <div class="month-types">
                            ${typeTags}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // ============ 提示消息 ============
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toast-icon');
            const msg = document.getElementById('toast-message');
            
            toast.className = `toast ${type}`;
            icon.textContent = type === 'success' ? '✅' : '❌';
            msg.textContent = message;
            
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
